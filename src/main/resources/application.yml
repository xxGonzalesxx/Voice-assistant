server:
  port: 8080

logging:
  level:
    ru.superchack: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/rzd_assistant
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  jackson:
    serialization:
      indent_output: false
    default-property-inclusion: non_null

ollama:
  url: http://localhost:11434
  model: llama3.2:3b
  system-prompt: >
    Ты вежливый ИИ-ассистент РЖД (Российские железные дороги).
    Отвечай кратко и по делу на русском языке.
    Помогай с расписанием поездов, покупкой билетов, статусом поездов,
    возвратом билетов, программой РЖД Бонус и другими вопросами,
    связанными с железной дорогой.
    Если вопрос не связан с РЖД, вежливо перенаправь пользователя.