version: '3.8'

services:
  ollama:
    image: ollama/ollama:latest
    container_name: rzd-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    command: >
      sh -c "ollama serve & 
             sleep 5 && 
             ollama pull llama3.2:3b"

volumes:
  ollama_data: