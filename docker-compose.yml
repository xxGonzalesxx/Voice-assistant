version: '3.8'

services:
  ollama:
    image: ollama/ollama:latest
    container_name: rzd-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    command: >
      sh -c "ollama serve &
             until ollama list > /dev/null 2>&1; do sleep 1; done &&
             ollama pull llama3.2:3b &&
             wait"
volumes:
  ollama_data: