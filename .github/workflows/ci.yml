name: CI

on:
  push:
    branches: [ main, develop, feature/* ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * 0'  # еженедельно по воскресеньям

env:
  JAVA_VERSION: '17'
  NODE_VERSION: '20'

jobs:
  # ============================================================
  # 1. СТАТИЧЕСКИЙ АНАЛИЗ ФРОНТЕНДА
  # ============================================================
  frontend-lint:
    name: Frontend - Lint & Format
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: |
          npm install -g eslint prettier stylelint

      - name: ESLint check
        run: |
          npx eslint src/main/resources/static/js/*.js --max-warnings=0 --format=compact || echo "⚠️ ESLint issues found"

      - name: Prettier format check
        run: |
          npx prettier --check "src/main/resources/static/**/*.{js,css,html}"

      - name: Stylelint check
        run: |
          npx stylelint "src/main/resources/static/css/*.css" --max-warnings=0 || echo "⚠️ Stylelint issues found"

  # ============================================================
  # 2. ТЕСТЫ ФРОНТЕНДА
  # ============================================================
  frontend-test:
    name: Frontend - Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install test runners
        run: |
          npm install -g jest playwright
          npx playwright install --with-deps chromium

      - name: Run unit tests
        run: |
          echo "Running JS unit tests"
          # npx jest src/test/js/

      - name: Run E2E tests
        run: |
          echo "Running E2E tests"
          # npx playwright test

  # ============================================================
  # 3. СТАТИЧЕСКИЙ АНАЛИЗ БЭКЕНДА
  # ============================================================
  backend-lint:
    name: Backend - Static Analysis
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Checkstyle
        run: |
          mvn checkstyle:check || echo "⚠️ Checkstyle issues found"

      - name: SpotBugs (FindBugs)
        run: |
          mvn spotbugs:check || echo "⚠️ SpotBugs issues found"

      - name: PMD
        run: |
          mvn pmd:check || echo "⚠️ PMD issues found"

  # ============================================================
  # 4. ТЕСТЫ БЭКЕНДА
  # ============================================================
  backend-test:
    name: Backend - Unit & Integration Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Run unit tests
        run: mvn test

      - name: Run integration tests
        run: mvn verify -DskipUnitTests

      - name: Generate coverage report
        run: mvn jacoco:report

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: target/site/jacoco/jacoco.xml

  # ============================================================
  # 5. СБОРКА И КОНТЕЙНЕРИЗАЦИЯ
  # ============================================================
  build:
    name: Build & Package
    runs-on: ubuntu-latest
    needs: [frontend-lint, backend-lint, backend-test]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Build JAR
        run: mvn clean package -DskipTests

      - name: Build Docker image
        run: |
          docker build -t rzd-assistant:${{ github.sha }} .
          docker tag rzd-assistant:${{ github.sha }} rzd-assistant:latest

      - name: Scan for vulnerabilities (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: rzd-assistant:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: rzd-assistant-jar
          path: target/*.jar

  # ============================================================
  # 6. СЕКЬЮРИТИ СКАН
  # ============================================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'RZD Assistant'
          path: '.'
          format: 'HTML'
          out: 'reports'

      - name: Upload OWASP report
        uses: actions/upload-artifact@v4
        with:
          name: owasp-report
          path: reports

      - name: Snyk security scan
        uses: snyk/actions/maven@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --sarif-file-output=snyk.sarif

      - name: Upload Snyk results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: snyk.sarif

  # ============================================================
  # 7. ПРОИЗВОДИТЕЛЬНОСТЬ
  # ============================================================
  performance:
    name: Performance Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Start application
        run: |
          mvn spring-boot:run &
          sleep 30

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v10
        with:
          urls: |
            http://localhost:8080/
          uploadArtifacts: true
          temporaryPublicStorage: true

      - name: Run k6 load test
        uses: grafana/k6-action@v0.3.1
        with:
          filename: src/test/k6/load-test.js

      - name: Stop application
        run: pkill -f spring-boot

  # ============================================================
  # 8. ДОСТУПНОСТЬ (A11Y)
  # ============================================================
  accessibility:
    name: Accessibility Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install axe-core
        run: npm install -g @axe-core/cli

      - name: Start application
        run: |
          mvn spring-boot:run &
          sleep 30

      - name: Run axe accessibility scan
        run: |
          npx axe http://localhost:8080/ --save results.json --exit

      - name: Upload accessibility report
        uses: actions/upload-artifact@v4
        with:
          name: a11y-report
          path: results.json

  # ============================================================
  # 9. СОВМЕСТИМОСТЬ БРАУЗЕРОВ
  # ============================================================
  browser-compat:
    name: Browser Compatibility
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Run browserlist check
        run: |
          npx browserslist --update-db
          npx @mdn/browser-compat-data

  # ============================================================
  # 10. DEPLOYMENT (только main)
  # ============================================================
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [build, security, performance, accessibility]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: rzd-assistant-jar
          path: target/

      - name: Deploy to server
        run: |
          echo "Deploying to production server"
          # scp target/*.jar user@server:/app/
          # ssh user@server 'systemctl restart rzd-assistant'